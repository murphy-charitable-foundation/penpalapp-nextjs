<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Offline Page</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #f3f4f6;
                font-family: Arial, sans-serif;
            }

            .container {
                text-align: center;
            }

            img {
                width: 180px;
                height: auto;
                margin-bottom: 24px;
            }

            h1 {
                margin: 0 0 10px;
                font-size: 2rem; /* bigger messages */
                color: #111827;
            }

            p {
                margin: 0;
                font-size: 1.2rem; /* bigger messages */
                color: #4b5563;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <img src="/murphylogo.png" alt="Murphy logo" />
            <h1>You are offline.</h1>
            <p>Please check your network connection.</p>
        </div>
        
    </body>
</html>
